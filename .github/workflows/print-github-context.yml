name: Print GitHub Context Values

on:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:

jobs:
  print-values:
    runs-on: ubuntu-latest
    steps:
      - name: Print selected github context values
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PR_MERGED: ${{ github.event.pull_request.merged || false }}
          PR_MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha || '' }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          echo "EVENT_NAME=$EVENT_NAME"
          echo "PR_HEAD_SHA=$PR_HEAD_SHA"
          echo "PR_MERGED=$PR_MERGED"
          echo "PR_MERGE_COMMIT_SHA=$PR_MERGE_COMMIT_SHA"
          echo "DEFAULT_SHA=$DEFAULT_SHA"
